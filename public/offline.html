<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Нет соединения — LuxOkna</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bone: #f2ecdf;
        --char: #1a1714;
        --sand: #6a5c45;
        --copper: #a85031;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bone);
        color: var(--char);
        font-family: Georgia, 'Times New Roman', serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .wrap {
        max-width: 520px;
        text-align: left;
      }
      .mark {
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--char);
      }
      .rule {
        margin: 24px 0;
        height: 2px;
        width: 80px;
        background: var(--copper);
      }
      h1 {
        font-size: clamp(40px, 9vw, 72px);
        line-height: 1.05;
        margin: 0 0 16px;
        letter-spacing: -0.01em;
      }
      p {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 17px;
        line-height: 1.55;
        color: var(--sand);
        margin: 0 0 16px;
      }
      .meta {
        margin-top: 32px;
        font-family: ui-monospace, 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sand);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">LUX·OKNA</div>
      <div class="rule"></div>
      <h1>Нет соединения.</h1>
      <p>Попробуйте позже — мы будем здесь, когда сеть вернётся.</p>
      <div class="meta">Offline · 503</div>
    </div>
  </body>
</html>
